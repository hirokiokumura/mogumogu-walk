name: CI

on:
  pull_request:
    branches: [main]

jobs:
  biome:
    name: Biome check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Biome
        run: npx @biomejs/biome@2.4.15 ci .

      - name: Install Playwright WebKit
        run: npx playwright install --with-deps webkit

      - name: Run Playwright
        run: npm run test:e2e
